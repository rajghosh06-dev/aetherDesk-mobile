<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Model Manager - AetherDesk Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 16px;
      background: var(--nav-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--panel-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--text-primary);
      padding: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
    }
    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0;
    }
    .model-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }
    @media (min-width: 1024px) {
      .model-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    .model-card {
      background: var(--card-bg-inner, rgba(255, 255, 255, 0.03));
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .model-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .model-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent-emerald);
      margin: 0;
    }
    .model-size {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-emerald), var(--accent-gold));
      width: 0%;
      transition: width 0.2s;
    }
    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
    }
    .btn-download {
      background: var(--accent-emerald);
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      align-self: flex-end;
    }
  </style>
</head>
<body class="dark-theme">
  <div class="header">
    <button class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="title">AI Model Setup</h1>
  </div>

  <div class="model-grid" id="model-grid">
    <!-- Cards will be injected here by model-manager.js -->
  </div>

  <script src="model-manager.js"></script>
  <script>
    // Theme sync
    const savedTheme = localStorage.getItem("theme") || "light";
    if (savedTheme === "light") {
      document.body.classList.remove("dark-theme");
      document.body.classList.add("light-theme");
    }
    if (window.AndroidBridge && window.AndroidBridge.setStatusBarTheme) {
      window.AndroidBridge.setStatusBarTheme(savedTheme);
    }
    
    // Global swipe-back logic
    let touchStartX = 0;
    let touchEndX = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    
    document.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      if (touchEndX - touchStartX > 100) {
        goBack(); // Swipe right to go back
      }
    }, { passive: true });

    function goBack() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
